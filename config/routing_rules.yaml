# ─────────────────────────────────────────────────────────────────────────────
# Enterprise Incident Auto-Router — Routing Rules Configuration
# Supports: ServiceNow · Jira · PagerDuty · Ivanti · Freshservice
# ─────────────────────────────────────────────────────────────────────────────

# Priority weight: keyword match wins over ML if confidence >= ml_confidence_threshold
ml_confidence_threshold: 0.72

# ─── Assignment Groups ────────────────────────────────────────────────────────
# platform_ids: platform-native group identifiers used in API assignment calls
#   servicenow  → assignment_group sys_id
#   jira        → Jira component name
#   pagerduty   → escalation policy ID
#   ivanti      → team name string
#   freshservice → group_id (integer, stored as string)

assignment_groups:

  network:
    display_name: "Network Operations"
    platform_ids:
      servicenow:   "netops-group-001"
      jira:         "Network"
      pagerduty:    "PD_NETOPS_EP_001"
      ivanti:       "Network Operations"
      freshservice: "12001"
    keywords:
      - network
      - vpn
      - firewall
      - switch
      - router
      - dns
      - dhcp
      - latency
      - packet loss
      - bandwidth
      - vlan
      - bgp
      - ospf
      - wan
      - lan
      - ping
      - traceroute
      - connectivity
      - link down
      - interface

  security:
    display_name: "Security Operations"
    platform_ids:
      servicenow:   "secops-group-002"
      jira:         "Security"
      pagerduty:    "PD_SECOPS_EP_002"
      ivanti:       "Security Operations"
      freshservice: "12002"
    keywords:
      - malware
      - ransomware
      - phishing
      - breach
      - vulnerability
      - exploit
      - intrusion
      - unauthorized
      - suspicious
      - threat
      - virus
      - trojan
      - certificate
      - ssl
      - tls
      - password
      - credential
      - mfa
      - authentication
      - privilege

  database:
    display_name: "Database Administration"
    platform_ids:
      servicenow:   "dba-group-003"
      jira:         "Database"
      pagerduty:    "PD_DBA_EP_003"
      ivanti:       "Database Administration"
      freshservice: "12003"
    keywords:
      - database
      - sql
      - oracle
      - postgres
      - postgresql
      - mysql
      - mssql
      - mongodb
      - query
      - deadlock
      - replication
      - backup
      - restore
      - tablespace
      - index
      - corruption
      - connection pool
      - db crash
      - transaction
      - schema

  application:
    display_name: "Application Operations"
    platform_ids:
      servicenow:   "appops-group-004"
      jira:         "Application"
      pagerduty:    "PD_APPOPS_EP_004"
      ivanti:       "Application Operations"
      freshservice: "12004"
    keywords:
      - application
      - app
      - api
      - service
      - microservice
      - deploy
      - deployment
      - release
      - build
      - pipeline
      - exception
      - error
      - crash
      - unresponsive
      - timeout
      - memory leak
      - cpu spike
      - pod
      - container
      - docker
      - kubernetes
      - k8s

  infrastructure:
    display_name: "Infrastructure Engineering"
    platform_ids:
      servicenow:   "infra-group-005"
      jira:         "Infrastructure"
      pagerduty:    "PD_INFRA_EP_005"
      ivanti:       "Infrastructure Engineering"
      freshservice: "12005"
    keywords:
      - server
      - vm
      - virtual machine
      - disk
      - storage
      - cpu
      - memory
      - ram
      - hardware
      - datacenter
      - rack
      - ups
      - power
      - cooling
      - hypervisor
      - vmware
      - azure
      - aws
      - cloud
      - infrastructure
      - os
      - operating system
      - reboot
      - boot

  service_desk:
    display_name: "IT Service Desk"
    platform_ids:
      servicenow:   "helpdesk-group-006"
      jira:         "Service Desk"
      pagerduty:    "PD_HELPDESK_EP_006"
      ivanti:       "IT Service Desk"
      freshservice: "12006"
    keywords:
      - password reset
      - account locked
      - access request
      - printer
      - laptop
      - desktop
      - monitor
      - keyboard
      - mouse
      - software install
      - license
      - outlook
      - email
      - teams
      - zoom
      - office
      - vpn client
      - onboarding
      - new user

# ─── Priority Escalation Rules ────────────────────────────────────────────────
priority_escalation:
  critical_keywords:
    - outage
    - down
    - unavailable
    - production down
    - sev1
    - severity 1
    - p1
    - data loss
    - breach
    - ransomware
    - all users

# ─── Fallback ─────────────────────────────────────────────────────────────────
fallback_group:
  display_name: "IT Service Desk"
  platform_ids:
    servicenow:   "helpdesk-group-006"
    jira:         "Service Desk"
    pagerduty:    "PD_HELPDESK_EP_006"
    ivanti:       "IT Service Desk"
    freshservice: "12006"

# ─── Polling ─────────────────────────────────────────────────────────────────
polling:
  interval_seconds: 60
  max_incidents_per_run: 50
  # ServiceNow: only process New (1) incidents
  # Other platforms use their own status filtering internally
  target_states:
    - 1
